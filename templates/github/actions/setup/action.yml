name: Setup
description: Setup project

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@

    - name: Setup Node.js
      uses: actions/setup-node@
      with:
        node-version-file: .tool-versions
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
